name: Release Binaries

on:
  workflow_call:
    inputs:
      tag:
        description: 'Tag to build binaries for (e.g., v1.2.3)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build binaries for (e.g., v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FFMPEG_HELPER_VERSION: "8.0"

jobs:
  build-binaries:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            asset_name: cfmpeg-darwin-arm64
          - os: macos-15-intel
            asset_name: cfmpeg-darwin-x64
          - os: ubuntu-24.04-arm
            asset_name: cfmpeg-linux-arm64
          - os: ubuntu-latest
            asset_name: cfmpeg-linux-x64

    steps:
      - name: Normalize and validate tag
        id: tag
        run: |
          TAG="${{ inputs.tag }}"
          TAG="${TAG#refs/tags/}"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Invalid tag format '$TAG'. Expected vX.Y.Z"
            exit 1
          fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.tag.outputs.value }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Install ffmpeg build dependencies
        if: matrix.asset_name == 'cfmpeg-linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm

      - name: Build bundled ffmpeg helpers
        run: bash scripts/build-helper-ffmpeg.sh "$RUNNER_TEMP/ffmpeg-helper"

      - name: Prepare release assets
        run: |
          mkdir -p release/bundle/bin release/bundle/libexec
          cp target/release/cfmpeg release/bundle/bin/cfmpeg
          cp "$RUNNER_TEMP/ffmpeg-helper/bin/ffmpeg" release/bundle/libexec/ffmpeg
          cp "$RUNNER_TEMP/ffmpeg-helper/bin/ffprobe" release/bundle/libexec/ffprobe
          chmod +x release/bundle/bin/cfmpeg release/bundle/libexec/ffmpeg release/bundle/libexec/ffprobe
          tar -czf "release/${{ matrix.asset_name }}.tar.gz" -C release/bundle .
          shasum -a 256 "release/${{ matrix.asset_name }}.tar.gz" > "release/${{ matrix.asset_name }}.tar.gz.sha256"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: |
            release/${{ matrix.asset_name }}.tar.gz
            release/${{ matrix.asset_name }}.tar.gz.sha256
