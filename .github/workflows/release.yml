name: Release
run-name: "Release ${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.0 or v1.2.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    if: github.repository == 'cfmpeg/cfmpeg-cli'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked

      - name: Verify build
        run: cargo build --locked

  release:
    needs: ci
    runs-on: ubuntu-latest
    if: github.repository == 'cfmpeg/cfmpeg-cli'
    outputs:
      version: ${{ steps.version.outputs.number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize and validate version
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Invalid version format '$VERSION'. Expected X.Y.Z or vX.Y.Z"
            exit 1
          fi
          echo "number=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check existing tag
        id: existing_tag
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v${{ steps.version.outputs.number }}" >/dev/null 2>&1; then
            echo "Release tag v${{ steps.version.outputs.number }} already exists; skipping manifest mutation."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        if: steps.existing_tag.outputs.exists != 'true'
        run: python3 scripts/set-version.py "${{ steps.version.outputs.number }}"

      - name: Verify manifest after bump
        if: steps.existing_tag.outputs.exists != 'true'
        run: cargo build --locked

      - name: Commit version bump
        if: steps.existing_tag.outputs.exists != 'true'
        run: |
          git add Cargo.toml Cargo.lock
          if git diff --cached --quiet; then
            echo "No manifest changes to commit for v${{ steps.version.outputs.number }}."
            exit 0
          fi
          git commit -m "Release v${{ steps.version.outputs.number }}"

      - name: Create and push tag
        if: steps.existing_tag.outputs.exists != 'true'
        run: |
          git tag "v${{ steps.version.outputs.number }}"
          git push origin "v${{ steps.version.outputs.number }}"

      - name: Push to main
        if: steps.existing_tag.outputs.exists != 'true'
        run: git push

  release-binaries:
    needs: release
    if: github.repository == 'cfmpeg/cfmpeg-cli'
    uses: ./.github/workflows/release-binaries.yml
    with:
      tag: v${{ needs.release.outputs.version }}

  publish-crate:
    needs: release
    runs-on: ubuntu-latest
    if: github.repository == 'cfmpeg/cfmpeg-cli'
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/v${{ needs.release.outputs.version }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check existing crate version
        id: existing_crate
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          CHECK_DIR="$(mktemp -d)"
          CHECK_OUTPUT="$(mktemp)"
          trap 'rm -rf "$CHECK_DIR" "$CHECK_OUTPUT"' EXIT

          if (cd "$CHECK_DIR" && cargo info "cfmpeg@${VERSION}" --color never > "$CHECK_OUTPUT" 2>&1); then
            echo "Crate cfmpeg ${VERSION} already exists; skipping crates.io publish."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          elif grep -Fq "could not find \`cfmpeg@${VERSION}\`" "$CHECK_OUTPUT"; then
            echo "Crate cfmpeg ${VERSION} does not exist yet."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            cat "$CHECK_OUTPUT" >&2
            echo "::error::Unable to check whether crate cfmpeg ${VERSION} exists."
            exit 1
          fi

      - name: Require crates.io token
        if: env.CARGO_REGISTRY_TOKEN == '' && steps.existing_crate.outputs.exists != 'true'
        run: |
          echo "::error::CARGO_REGISTRY_TOKEN is not configured."
          exit 1

      - name: Publish crate to crates.io
        if: env.CARGO_REGISTRY_TOKEN != '' && steps.existing_crate.outputs.exists != 'true'
        run: cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"

  update-homebrew:
    needs:
      - release
      - release-binaries
    runs-on: ubuntu-latest
    if: github.repository == 'cfmpeg/cfmpeg-cli'

    steps:
      - name: Update Homebrew formula
        env:
          VERSION: ${{ needs.release.outputs.version }}
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          HOMEBREW_TAP_OWNER: cfmpeg
          HOMEBREW_TAP_REPO: cfmpeg-homebrew-tap
        run: |
          set -euo pipefail

          if [ -z "${COMMITTER_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN is not configured."
            exit 1
          fi

          TAP_DIR="$(mktemp -d)"
          FORMULA_PATH="Formula/cfmpeg.rb"
          RELEASE_BASE_URL="https://github.com/${REPOSITORY}/releases/download/v${VERSION}"
          DARWIN_ARM64_ARCHIVE="cfmpeg-darwin-arm64.tar.gz"
          DARWIN_X64_ARCHIVE="cfmpeg-darwin-x64.tar.gz"
          LINUX_ARM64_ARCHIVE="cfmpeg-linux-arm64.tar.gz"
          LINUX_X64_ARCHIVE="cfmpeg-linux-x64.tar.gz"

          read_sha() {
            local name="$1"
            local hash=""
            for attempt in {1..8}; do
              hash="$(curl -fsSL "${RELEASE_BASE_URL}/${name}.sha256" | awk '{print $1}' | tr -d '\r\n' || true)"
              if [[ "$hash" =~ ^[a-f0-9]{64}$ ]]; then
                echo "$hash"
                return 0
              fi

              if [ "$attempt" -eq 8 ]; then
                echo "Failed to fetch valid checksum for ${name} after retries."
                exit 1
              fi

              sleep 10
            done
          }

          DARWIN_ARM64_SHA="$(read_sha "${DARWIN_ARM64_ARCHIVE}")"
          DARWIN_X64_SHA="$(read_sha "${DARWIN_X64_ARCHIVE}")"
          LINUX_ARM64_SHA="$(read_sha "${LINUX_ARM64_ARCHIVE}")"
          LINUX_X64_SHA="$(read_sha "${LINUX_X64_ARCHIVE}")"

          for hash in "$DARWIN_ARM64_SHA" "$DARWIN_X64_SHA" "$LINUX_ARM64_SHA" "$LINUX_X64_SHA"; do
            if ! [[ "$hash" =~ ^[a-f0-9]{64}$ ]]; then
              echo "Invalid checksum fetched from release assets: $hash"
              exit 1
            fi
          done

          git clone "https://x-access-token:${COMMITTER_TOKEN}@github.com/${HOMEBREW_TAP_OWNER}/${HOMEBREW_TAP_REPO}.git" "$TAP_DIR"
          cd "$TAP_DIR"

          cat > "$FORMULA_PATH" <<EOF
          class Cfmpeg < Formula
            desc "Cloud ffmpeg CLI that runs ffmpeg jobs on remote containers"
            homepage "https://github.com/${REPOSITORY}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${RELEASE_BASE_URL}/${DARWIN_ARM64_ARCHIVE}"
                sha256 "${DARWIN_ARM64_SHA}"
              else
                url "${RELEASE_BASE_URL}/${DARWIN_X64_ARCHIVE}"
                sha256 "${DARWIN_X64_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${RELEASE_BASE_URL}/${LINUX_ARM64_ARCHIVE}"
                sha256 "${LINUX_ARM64_SHA}"
              else
                url "${RELEASE_BASE_URL}/${LINUX_X64_ARCHIVE}"
                sha256 "${LINUX_X64_SHA}"
              end
            end

            def install
              bin.install "bin/cfmpeg"
              libexec.install "libexec/ffmpeg", "libexec/ffprobe"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/cfmpeg --version")
              assert_predicate libexec/"ffmpeg", :exist?
              assert_predicate libexec/"ffprobe", :exist?
            end
          end
          EOF

          git add "$FORMULA_PATH"

          if git diff --cached --quiet -- "$FORMULA_PATH"; then
            echo "No Homebrew formula changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "cfmpeg ${VERSION}"
          git push origin main

  smoke-test-homebrew:
    needs:
      - release
      - release-binaries
      - update-homebrew
    runs-on: macos-latest
    if: github.repository == 'cfmpeg/cfmpeg-cli'
    env:
      VERSION: ${{ needs.release.outputs.version }}
      REPOSITORY_OWNER: ${{ github.repository_owner }}
      HOMEBREW_TAP: cfmpeg/cfmpeg-homebrew-tap
      HOMEBREW_TAP_URL: https://github.com/cfmpeg/cfmpeg-homebrew-tap.git

    steps:
      - name: Smoke test Homebrew install
        run: |
          set -euo pipefail

          brew tap "${HOMEBREW_TAP}" "${HOMEBREW_TAP_URL}"

          for attempt in {1..8}; do
            if brew list --versions cfmpeg >/dev/null 2>&1; then
              brew upgrade "${HOMEBREW_TAP}/cfmpeg" || true
            else
              brew install "${HOMEBREW_TAP}/cfmpeg" || true
            fi

            INSTALLED_VERSION="$(brew list --versions cfmpeg 2>/dev/null | awk '{print $2}')"
            if [ "$INSTALLED_VERSION" = "$VERSION" ]; then
              break
            fi

            if [ "$attempt" -eq 8 ]; then
              echo "Homebrew install failed after retries."
              exit 1
            fi

            brew uninstall cfmpeg --force >/dev/null 2>&1 || true
            sleep 15
          done

          test "$(cfmpeg --version | awk 'NR==1 { print $2 }')" = "$VERSION"
